<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant Media Group | High-Performance Web Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            /* Animated Liquid Background */
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #3b82f6);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .text-gradient { 
            background: linear-gradient(to right, #60a5fa, #ffffff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .mobile-menu-open { transform: translateX(0) !important; }
        
        #mobile-sidebar {
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-800 tracking
